# ============================================================================
# 21cmFAST 功率谱演化配置文件
# ============================================================================


simulation:
  # --- 网格参数 ---
  HII_DIM: 128              # 网格维度
  BOX_LEN: 200.0            # 盒子边长 (Mpc)

  # --- 随机种子 ---
  random_seed: 1234

  # --- 功率谱计算参数 ---
  n_k_bins: 256
  k_min: 0.03
  k_max: 10.0

  # --- 红移范围 ---
  z_min: 5.0
  z_max: 25.0
  n_redshift: 20

  # --- 演化图中追踪的 k 值 ---
  k_targets: [0.10, 0.42, 1.00]

# ============================================================================
# 天体物理参数  (会覆盖模板中的默认值)
# ============================================================================
astro_params:
  ALPHA_STAR: 0.5
  HII_EFF_FACTOR: 30.0
  ION_Tvir_MIN: 4.7
  L_X: 40.5
