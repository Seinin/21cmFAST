# ============================================================================
# 21cmFAST 参数配置文件
# 支持 FDM 和 CDM 两种暗物质模型
# ============================================================================

# ============================================================================
# 模拟基础配置
# ============================================================================
simulation:
  # 网格参数
  HII_DIM: 128              # 低分辨率网格维度
  BOX_LEN: 200.0            # 盒子边长 (Mpc)
  DIM: 384                  # 高分辨率网格维度 (默认: 3*HII_DIM)
  
  # 随机种子
  random_seed_base: 42
  
  # 功率谱计算参数
  n_k_bins: 256             # k bins 数量
  k_min: 0.01               # 最小 k 值 (Mpc^-1)
  k_max: 10.0               # 最大 k 值 (Mpc^-1)

# ============================================================================
# CDM 模型参数范围 (4个参数)
# ============================================================================
CDM:
  # 参数范围定义
  parameter_ranges:
    alpha:
      min: 0.3
      max: 0.8
      description: "恒星形成幂律指数 (ALPHA_STAR)"
    zeta:
      min: 10.0
      max: 100.0
      description: "电离效率因子 (HII_EFF_FACTOR)"
    Tvir:
      min: 4.0
      max: 5.5
      unit: "log10(K)"
      description: "最小晕阈值温度 (ION_Tvir_MIN)"
    L_X:
      min: 38.0
      max: 42.0
      unit: "log10(erg/s)"
      description: "X射线光度 (L_X)"
  
  # 采样数量
  n_samples: 200
  
  # 默认参数值 (代表性参数，用于快速测试)
  # Tvir = 2×10^4 K = 4.30 log10(K)
  # zeta = 20
  # alpha = -1.1
  # L_X = 40.0 log10(erg/s)
  default_params:
    alpha: -1.1
    zeta: 20.0
    Tvir: 4.30
    L_X: 40.0

# ============================================================================
# FDM 模型参数范围 (5个参数，含 M_TURN)
# ============================================================================
FDM:
  # 参数范围定义
  parameter_ranges:
    m22:
      min: 5.0
      max: 10.0
      unit: "log10(Msun)"
      description: "FDM转折质量 (M_TURN), 对应 ~10^-22 eV"
    alpha:
      min: 0.3
      max: 0.8
      description: "恒星形成幂律指数 (ALPHA_STAR)"
    zeta:
      min: 10.0
      max: 100.0
      description: "电离效率因子 (HII_EFF_FACTOR)"
    Tvir:
      min: 4.0
      max: 5.5
      unit: "log10(K)"
      description: "最小晕阈值温度 (ION_Tvir_MIN)"
    L_X:
      min: 38.0
      max: 42.0
      unit: "log10(erg/s)"
      description: "X射线光度 (L_X)"
  
  # 采样数量
  n_samples: 200
  
  # 默认参数值
  # Tvir = 2×10^4 K = 4.30 log10(K)
  # m22 = 10 (对应约10^-22 eV)
  # zeta = 20
  # alpha = -1.1
  # L_X = 40.0 log10(erg/s)
  default_params:
    m22: 10.0
    alpha: -1.1
    zeta: 20.0
    Tvir: 4.30
    L_X: 40.0

# ============================================================================
# 红移演化曲线绘制配置
# ============================================================================
redshift_evolution:
  # 红移范围
  z_min: 5.0
  z_max: 25.0
  
  # 红移采样数量 (在范围内均分)
  n_redshift: 40
  
  # 绘图采样点数量 (曲线平滑度)
  n_plot_points: 60
  
  # 目标 k 值列表 (Mpc^-1)
  # 注意: k=0.09 区域数据可能不稳定，建议使用 0.10
  k_targets:
    - 0.10
    - 0.42
    - 1.00

# ============================================================================
# 宇宙学参数 (可选，一般使用默认值)
# ============================================================================
cosmology:
  SIGMA_8: 0.81
  hlittle: 0.67
  OMm: 0.31
  OMb: 0.05
  POWER_INDEX: 0.96

# ============================================================================
# 标志选项 (可选)
# ============================================================================
flag_options:
  USE_MINI_HALOS: false
  INHOMO_RECO: false
  USE_TS_FLUCT: false
  USE_RELATIVE_VELOCITIES: false
