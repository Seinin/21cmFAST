# ============================================================================
# 21cmFAST FDM (Fuzzy Dark Matter) 功率谱演化配置文件
# ============================================================================

template: simple

simulation:
  HII_DIM: 128
  BOX_LEN: 200.0
  random_seed: 42
  n_k_bins: 256
  k_min: 0.03
  k_max: 10.0
  z_min: 5.0
  z_max: 25.0
  n_redshift: 20
  k_targets: [0.10, 0.42, 1.00]

# ============================================================================
# 天体物理参数 (含FDM特有参数)
# ============================================================================
astro_params:
  # --- 通用天体物理参数 ---
  ALPHA_STAR: 0.5           # 恒星形成幂律指数
  HII_EFF_FACTOR: 30.0      # 电离效率因子 (zeta)
  ION_Tvir_MIN: 4.7         # 最小晕阈值温度 log10(K)
  L_X: 40.5                 # X射线光度 log10(erg/s)

  # --- FDM 特有参数 ---
  # M_TURN: 转折质量 log10(Msun)
  #   低于此质量的 halo 恒星形成效率受抑制，模拟 FDM 效应
  #   典型范围: 8.0 ~ 10.0
  #   默认值: 8.7 (CDM 极限)
  M_TURN: 9.5               # FDM 转折质量
